<!doctype html>
<html lang="en" class="sl-theme-dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Item Sorter</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.20.1/cdn/themes/light.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.20.1/cdn/themes/dark.css" />
    <link rel="stylesheet" href="styles.css" />
    <script type="module" src="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.20.1/cdn/shoelace-autoloader.js"></script>
  </head>
  <body>
    <div class="page-shell">
      <header class="topbar">
        <div>
          <h1>Item Sorter</h1>
          <p class="subtitle">Weighted random printer assignment with local save, text export, and text import.</p>
        </div>
        <div class="topbar-actions">
          <sl-dropdown id="appActionsDropdown" placement="bottom-end">
            <sl-button slot="trigger" variant="primary" caret>Actions</sl-button>
            <sl-menu>
              <sl-menu-item id="addPrinterBtn">Add Printer</sl-menu-item>
              <sl-menu-item id="addRequestBtn">Add Request</sl-menu-item>
              <sl-divider></sl-divider>
              <sl-menu-item id="shareBtn">Share</sl-menu-item>
              <sl-menu-item id="exportBtn">Export Text</sl-menu-item>
              <sl-menu-item id="importBtn">Import Text</sl-menu-item>
              <sl-divider></sl-divider>
              <sl-menu-item id="themeToggleBtn">Light mode</sl-menu-item>
            </sl-menu>
          </sl-dropdown>
        </div>
      </header>

      <div id="statusBanner" class="status-banner" aria-live="polite"></div>

      <main class="content">
        <section class="section-block">
          <div class="section-head">
            <h2>Printers</h2>
            <span id="printerCount" class="muted"></span>
          </div>
          <div id="printersContainer" class="printers-grid"></div>
        </section>

        <section class="section-block">
          <div class="section-head">
            <h2>Unassigned</h2>
            <span id="unassignedCount" class="muted"></span>
          </div>
          <div id="unassignedContainer" class="queue-list"></div>
        </section>

        <section class="section-block">
          <div class="section-head">
            <h2>Printed Queue</h2>
            <span id="printedCount" class="muted"></span>
          </div>
          <div id="printedContainer" class="queue-list"></div>
        </section>
      </main>
    </div>

    <sl-dialog id="modalDialog" class="app-dialog">
      <div id="modalBody" class="modal-body"></div>
      <div id="modalFooter" class="modal-footer" slot="footer"></div>
    </sl-dialog>

    <script src="core.js"></script>
    <script src="app.js"></script>
  </body>
</html>
